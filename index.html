<!DOCTYPE html>
<html lang="en">
<head>
  <title>GEOG576 Lab 1</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="" />
  
  <!-- ArcGIS Maps SDK -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.25/"></script>

  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Scale up Esri widgets they were too small at first */
    .esri-ui .esri-component {
      transform: scale(1.3);
      transform-origin: top left;
    }

    /* Search bar */
    .esri-search__input {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 15px;
      height: 42px;
    }

    .esri-search {
      width: 280px;
    }

    /* Icon buttons */
    .esri-widget--button {
      width: 42px;
      height: 42px;
      font-size: 18px;
    }

    .esri-icon {
      font-size: 18px;
    }

    /* Basemap gallery panel */
    .esri-basemap-gallery {
      width: 260px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .esri-basemap-gallery__item-title {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 13px;
    }

    /* "Change basemap" expand button label */
    .basemap-expand .esri-expand__text {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 13px;
    }

    /* Gap between locate and basemap expand buttons */
    .basemap-expand {
      margin-top: 20px;
    }
    /* Match search bar's left offset on the right side */
    .esri-ui-top-right,
    .esri-ui-bottom-right {
      right: 15px;
    }

    .esri-ui-bottom-right {
      bottom: 30px;
    }
  </style>
</head>

<body>
  <div id="viewDiv"></div>

  <script>
  require([
    "esri/config",
    "esri/Map",
    "esri/views/MapView",
    "esri/Basemap",
    "esri/layers/VectorTileLayer",
    "esri/widgets/BasemapGallery",
    "esri/widgets/Expand",
    "esri/widgets/Locate",
    "esri/widgets/Search",
    "esri/widgets/Zoom"
  ], function(esriConfig, Map, MapView, Basemap, VectorTileLayer, BasemapGallery, Expand, Locate, Search, Zoom) {

    esriConfig.apiKey = "AAPTaa9E1vn_Ct8yjoJyTsAZ20A..NXZTAONl7Ne_FV7ahFJyatCBKsgzfsMsJRZx0RHWAdfIhNy4sG0UEA9R3OFyJogHr9A7ax6NHI4m5jRQaUI0e0Z-G9g0RziGO0lTsR3vV8vZgYpFfyDD5i3dsU48UuHIR7pnhnTDPZieL2Qw48dzU6L8OM3qGR6YmcTUG4TLtZvKtuP6qO46RpOFANmgyUkWmo1CzXi-5COIjQusHbGylzRA9czvx_SzmwOmXO2irNvZShJ_XBf_bAn7HqV4QRMbdfoXCcNmNg..AT1_IMV5kkt8";

    const communityBasemap = new Basemap({
      baseLayers: [
        new VectorTileLayer({
          url: "https://basemapstyles-api.arcgis.com/arcgis/rest/services/styles/v2/styles/arcgis/community?token=" + esriConfig.apiKey
        })
      ],
      title: "Community",
      id: "community"
    });

    const map = new Map({
      basemap: communityBasemap
    });

    const view = new MapView({
      map: map,
      center: [-77.0264, 38.9015], // Washington, DC
      zoom: 13,
      container: "viewDiv",
      ui: {
        components: [] // Remove all default UI so we control placement entirely
      }
    });

    // Search bar in top left
    const searchWidget = new Search({
      view: view
    });
    view.ui.add(searchWidget, { position: "top-left", index: 0 });

    // Locate button in top right
    const locateBtn = new Locate({
      view: view
    });
    view.ui.add(locateBtn, { position: "top-right", index: 0 });

    // BasemapGallery in expand
    const basemapGallery = new BasemapGallery({
      view: view
    });

    const bgExpand = new Expand({
      view: view,
      content: basemapGallery,
      expandIconClass: "esri-icon-basemap",
      expandTooltip: "Change basemap",
      label: "Change basemap",        // Text label next to icon
      container: document.createElement("div") // Needed to apply custom class
    });

    // Apply gap class after widget is created
    bgExpand.container.classList.add("basemap-expand");

    view.ui.add(bgExpand, { position: "top-right", index: 1 });

    // Zoom buttons at bottom-right
    const zoom = new Zoom({
      view: view
    });
    view.ui.add(zoom, { position: "bottom-right" });

  });
  </script>
</body>
</html>
